<!DOCTYPE html>
<html>

<head>
    <title>Impossible Structure Builder</title>
    <link rel="icon" type="image/svg+xml" href="images/favicons/impossible_structure_builder.svg" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/impossible_structure_builder/main.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="scripts/vectors.js" defer></script>
    <script src="scripts/canvas_control_base.js" defer></script>
    <script src="scripts/impossible_structure_builder/canvas_control.js" defer></script>
    <script src="scripts/impossible_structure_builder/main.js" defer></script>
</head>

<body>
    <div id="main-banner">
        <a href="index.html" id="button-home" class="icon-button" title="Home Page">
            <img src="images/svg_icons/home.svg">
        </a>
        <div>Impossible Structure Builder</div>
        <div style="display: flex;">
            <button id="button-download" class="icon-button" title="Download project"><img src="images/svg_icons/download.svg"></button>
            <button id="button-upload" class="icon-button" title="Upload a project file from your computer"><img src="images/svg_icons/upload.svg"></button>
            <input id="input-upload" class="invisible" type="file" accept=".json">
        </div>
    </div>

    <div id="toolbar">
        <div class="toolbar-item">
            <button class="tool-button selected" data-tool="move">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/move.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="move" title="Click and drag to move the canvas">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/move.svg">
                    <div>Move</div>
                </button>
            </div>
        </div>
        <div class="toolbar-item">
            <button class="tool-button" data-tool="add-vertex-click">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/add_vertex_click.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="add-vertex-click" title="Click to add a vertex">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/add_vertex_click.svg">
                    <div>Add Vertex</div>
                </button>
                <button class="tool-submenu-button" data-tool="add-vertex-coordinates" title="Click to add a vertex at a specific location">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/add_vertex_coordinates.svg">
                    <div>Add Vertex at Coordinates</div>
                </button>
            </div>
        </div>
        <div class="toolbar-item">
            <button class="tool-button" data-tool="extend-beam-vertex">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/extend_beam_vertex.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="extend-beam-vertex" title="Select a vertex and click to extend the beam">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/extend_beam_vertex.svg">
                    <div>Extend Beam with New Vertex</div>
                </button>
                <button class="tool-submenu-button" data-tool="extend-beam-length" title="Select a vertex and enter a length to extend the beam">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/extend_beam_length.svg">
                    <div>Extend Beam with Length</div>
                </button>
            </div>
        </div>
        <div class="toolbar-item">
            <button class="tool-button" data-tool="connect-vertex-along-axes">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/connect_vertex_along_axes.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="connect-vertex-along-axes" title="Select two vertices and axes to connect them">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/connect_vertex_along_axes.svg">
                    <div>Connect Vertex Along Axes</div>
                </button>
                <button class="tool-submenu-button" data-tool="connect-vertex-beam" title="Select a vertex, axis, and beam to connect them">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/connect_vertex_beam.svg">
                    <div>Connect Vertex to Beam</div>
                </button>
                <button class="tool-submenu-button" data-tool="beam-intersection" title="Select two beams to create an intersection">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/beam_intersection.svg">
                    <div>Beam Intersection</div>
                </button>
            </div>
        </div>
    </div>
    <div style="flex-grow: 1; position: relative; overflow: hidden;">
        <div id="main-canvas">
            <canvas style="width: 100%; height: 100%;"></canvas>
        </div>
    </div>

</body>
