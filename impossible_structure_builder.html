<!DOCTYPE html>
<html>

<head>
    <title>Impossible Structure Builder</title>
    <link rel="icon" type="image/svg+xml" href="images/favicons/impossible_structure_builder.svg" />
    <link rel="stylesheet" href="styles/colors.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/impossible_structure_builder/main.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="scripts/vectors.js" defer></script>
    <script src="scripts/canvas_control_base.js" defer></script>
    <script src="scripts/impossible_structure_builder/canvas_control.js" defer></script>
    <script src="scripts/impossible_structure_builder/main.js" defer></script>
</head>

<body class="blue-dark-theme">
    <div id="main-banner">
        <a href="index.html" id="button-home" class="icon-button" title="Home Page">
            <img src="images/svg_icons/home.svg">
        </a>
        <div>Impossible Structure Builder</div>
        <div style="display: flex;">
            <button id="button-download" class="icon-button" title="Download project"><img src="images/svg_icons/download.svg"></button>
            <button id="button-upload" class="icon-button" title="Upload a project file from your computer"><img src="images/svg_icons/upload.svg"></button>
            <input id="input-upload" class="invisible" type="file" accept=".json">
        </div>
    </div>

    <div id="toolbar">
        <div class="toolbar-item">
            <button class="tool-button selected" data-tool="move">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/move.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="move" title="Drag to move the canvas">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/move.svg">
                    <div>Move</div>
                </button>
                <button class="tool-submenu-button" data-tool="select" title="Click on a object to select it">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/select.svg">
                    <div>Select</div>
                </button>
            </div>
        </div>
        <div class="toolbar-item">
            <button class="tool-button" data-tool="add-vertex-click">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/add_vertex_click.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="add-vertex-click" title="Click to add a vertex">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/add_vertex_click.svg">
                    <div>Add Vertex</div>
                </button>
                <button class="tool-submenu-button" data-tool="add-vertex-coordinates" title="Click to add a vertex at a specific location">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/add_vertex_coordinates.svg">
                    <div>Add Vertex at Coordinates</div>
                </button>
                <button class="tool-submenu-button" data-tool="add-vertex-beam" title="Select a beam and click to add a vertex">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/add_vertex_beam.svg">
                    <div>Add Vertex on Beam</div>
                </button>
            </div>
        </div>
        <div class="toolbar-item">
            <button class="tool-button" data-tool="extend-beam-vertex">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/extend_beam_vertex.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="extend-beam-vertex" title="Select a vertex and click to extend the beam">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/extend_beam_vertex.svg">
                    <div>Extend Beam with New Vertex</div>
                </button>
                <button class="tool-submenu-button" data-tool="extend-beam-length" title="Select a vertex and enter a length to extend the beam">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/extend_beam_length.svg">
                    <div>Extend Beam with Length</div>
                </button>
                <button class="tool-submenu-button" data-tool="connect-vertices" title="Select two vertices to connect them with a beam">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/connect_vertices.svg">
                    <div>Connect Vertices</div>
                </button>
            </div>
        </div>
        <div class="toolbar-item">
            <button class="tool-button" data-tool="connect-vertex-along-axes">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/connect_vertex_along_axes.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="connect-vertex-along-axes" title="Select two vertices and axes to connect them">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/connect_vertex_along_axes.svg">
                    <div>Connect Vertex Along Axes</div>
                </button>
                <button class="tool-submenu-button" data-tool="connect-vertex-beam" title="Select a vertex, axis, and beam to connect them">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/connect_vertex_beam.svg">
                    <div>Connect Vertex to Beam</div>
                </button>
                <button class="tool-submenu-button" data-tool="beam-intersection" title="Select two beams to create an intersection">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/beam_intersection.svg">
                    <div>Beam Intersection</div>
                </button>
            </div>
        </div>
        <div class="toolbar-item">
            <button class="tool-button" data-tool="delete-vertex">
                <img class="tool-icon" src="images/impossible_structure_builder_tools/delete_vertex.svg">
            </button>
            <div class="tool-submenu invisible">
                <button class="tool-submenu-button" data-tool="delete-vertex" title="Click on a vertex to delete it and all the beams connected to it">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/delete_vertex.svg">
                    <div>Delete Vertex</div>
                </button>
                <button class="tool-submenu-button" data-tool="dissolve-vertex" title="Click on a vertex to delete it. Beams on the same axis are reconnected; beams without a matching connection are deleted.">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/dissolve_vertex.svg">
                    <div>Dissolve Vertex</div>
                </button>
                <button class="tool-submenu-button" data-tool="delete-beam" title="Click on a beam to delete it">
                    <img class="tool-icon" src="images/impossible_structure_builder_tools/delete_beam.svg">
                    <div>Delete Beam</div>
                </button>
            </div>
        </div>
    </div>
    <div style="display: flex; flex-grow: 1; position: relative; overflow: hidden;">
        <div id="main-sidebar">
            <div id="element-list" class="scrollbar"></div>
        </div>

        <div id="main-canvas">
            <canvas style="width: 100%; height: 100%;background-color: #0f172a"></canvas>
        </div>

        <div id="general-settings-frame">
            <button id="general-settings-icon" class="icon-button">
                <img src="images/svg_icons/gear.svg">
            </button>
            <div id="general-settings" class="invisible scrollbar">
                <div id="general-settings-title">General Settings</div>
                <div class="general-settings-section">
                    <div class="general-settings-section-title">Rendering Styles</div>
                    <div class="general-settings-section-grid" data-setting_type="rendering_styles">
                        <div>Background Color</div>
                        <input type="color" data-setting="background_color" value="#0f172a">
                        <div>Vertex Fill Color 1</div>
                        <input type="color" data-setting="vertex_fill_color_1" value="#ffffff">
                        <div>Vertex Fill Color 2</div>
                        <input type="color" data-setting="vertex_fill_color_2" value="#808080">
                        <div>Vertex Fill Color 3</div>
                        <input type="color" data-setting="vertex_fill_color_3" value="#000000">
                        <div>Beam Fill Color 1</div>
                        <input type="color" data-setting="beam_fill_color_1" value="#ffffff">
                        <div>Beam Fill Color 2</div>
                        <input type="color" data-setting="beam_fill_color_2" value="#808080">
                        <div>Beam Fill Color 3</div>
                        <input type="color" data-setting="beam_fill_color_3" value="#000000">
                        <div>Hover Color</div>
                        <input type="color" data-setting="hover_color" value="#add8e6">
                        <div>Hover Alpha</div>
                        <input type="number" min="0" max="1" step="0.1" data-setting="hover_alpha" value="0.5">
                        <div>Select Color</div>
                        <input type="color" data-setting="select_color" value="#ade6b5">
                        <div>Select Alpha</div>
                        <input type="number" min="0" max="1" step="0.1" data-setting="select_alpha" value="0.8">
                        <div>Axis Arrow Color</div>
                        <input type="color" data-setting="axis_arrow_color" value="#ffffff">
                        <div>Preview Alpha</div>
                        <input type="number" min="0" max="1" step="0.1" data-setting="preview_alpha" value="0.5">
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
