<!DOCTYPE html>
<html>

<head>
    <title>Skyblock Tools</title>
    <link rel="icon" type="image/x-icon" href="images/favicons/skyblock_tools.ico" />
    <link rel="stylesheet" href="styles/colors.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/skyblock_tools/main.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="scripts/skyblock_tools/main.js" defer></script>
    <script src="scripts/skyblock_tools/fossil_finder.js" defer></script>
</head>

<body class="orange-theme">
    <button id="button-show-sidebar" class="icon-button invisible" title="Show sidebar">
        <img src="images/svg_icons/3_lines.svg">
    </button>
    <aside id="main-sidebar">
        <header>
            <button id="button-hide-sidebar" class="icon-button" title="Hide sidebar">
                <img src="images/svg_icons/3_lines.svg">
            </button>
            <a href="index.html" id="button-home" class="icon-button" title="Home Page">
                <img src="images/svg_icons/home.svg">
            </a>
        </header>
        <section>
            <button id="button-skyblock-tools-main">List</button>
            <button id="button-skyblock-tools-fossil-finder">Fossil Solver</button>
        </section>
    </aside>
    <main id="main-container">
        <section id="home" class="editor">
            <header><div>Skyblock Tools</div></header>
            <section style="padding: 10px; line-height: 40px;">
                <div style="font-size: 24px;">Welcome to Skyblock Tools!<br>
                    Explore our helpful tools:<br>
                    <br>
                    ● Fossil Solver<br>
                    Locate fossils in the excavator.<br>
                    <br>
                    <!-- ● Gemstone Calculator<br>
                    Calculate things related to gemstone<br>
                    <br> -->
                    Hope you find something useful here!<br>
                </div>
            </section>
        </section>
        <section id="fossil-finder" class="editor invisible">
            <header><div>Fossil Solver</div></header>
            <section style="padding: 10px;">
                <div id="fossil-finder-excavator" class="ui ui-chest">
                    <div class="ui-header">Fossil Excavator</div>
                </div>
                <div id="fossil-finder-selection" class="ui ui-chest invisible" style="position: absolute;"></div>
                <button id="fossil-finder-reset" class="text-button" onclick="fossil_finder_reset()">Reset</button>
                <div style="display: flex; float: right;">
                    <div style="margin: 10px;">Possible Fossils: 0</div>
                </div>
                <div style="display: flex; align-items: center; float: right;">
                    <div>Fossil Excavation Progress:</div>
                    <input id="fossil-finder-progress" type="number" min="1" max="99" oninput="fossil_finder_progress_oninput(this)">
                    <div>%</div>
                </div>
            </section>
        </section>
    </main>
</body>

</html>
