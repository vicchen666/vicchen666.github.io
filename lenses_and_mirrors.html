<!DOCTYPE html>
<html>

<head>
    <title>Lenses and Mirrors</title>
    <link rel="icon" type="image/svg+xml" href="images/favicons/lenses_and_mirrors.svg" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/lenses_and_mirrors/main.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="scripts/vectors.js" defer></script>
    <script src="scripts/canvas_control_base.js" defer></script>
    <script src="scripts/lenses_and_mirrors/canvas_control.js" defer></script>
    <script src="scripts/lenses_and_mirrors/main.js" defer></script>
</head>

<body>
    <div id="main-banner">
        <a href="index.html" id="button-home" class="icon-button" title="Home Page">
            <img src="images/svg_icons/home.svg">
        </a>
        <div>Lenses and Mirrors</div>
        <div style="display: flex;">
            <button id="button-download" class="icon-button" title="Download project"><img src="images/svg_icons/download.svg"></button>
            <button id="button-upload" class="icon-button" title="Upload a project file from your computer"><img src="images/svg_icons/upload.svg"></button>
            <input id="input-upload" class="invisible" type="file" accept=".json">
        </div>
    </div>

    <div style="flex-grow: 1; position: relative; overflow: hidden;">
        <div id="main-sidebar">
            <div style="display: flex;">
                <button class="tab clickable" style="border-width: 0 1px 1px 0;">
                    <img src="images/svg_icons/plus.svg" style="height: 30px;">
                </button>
                <button class="tab">
                    <img src="images/svg_icons/3_lines.svg" style="height: 40px;">
                </button>
            </div>
            <div id="element-add" class="invisible scrollbar">
                <button data-type="optical_elements">Convex Lens</button>
                <button data-type="optical_elements">Concave Lens</button>
                <button data-type="optical_elements">Convex Mirror</button>
                <button data-type="optical_elements">Concave Mirror</button>
                <button data-type="optical_elements">Flat Mirror</button>
                <button data-type="optical_elements">Barrier</button>
                <button data-type="light_sources">Point Source</button>
                <button data-type="light_sources">Parallel Source</button>
            </div>
            <div id="element-list" class="scrollbar"></div>
        </div>

        <div id="main-canvas">
            <canvas style="width: 100%; height: 100%;"></canvas>
        </div>

        <div id="general-settings-frame">
            <button id="general-settings-icon" class="icon-button"><img src="images/svg_icons/gear.svg"></button>
            <div id="general-settings" class="invisible">
                <div style="font-size: 30px;">General Settings</div>
                <div>
                    <div style="font-size: 24px;">Ray Rendering</div>
                    <div class="general-settings-grid" data-setting_type="ray_rendering">
                        <div>Max&nbsp;Ray Length</div>
                        <input type="number" step="any" data-setting="max_distance" value="3000">
                        <div>Solid Length</div>
                        <input type="number" step="any" data-setting="fill_length" value="20">
                        <div>Gap Length</div>
                        <input type="number" step="any" data-setting="sep_length" value="10">
                    </div>
                </div>
            </div>
        </div>

        <div id="element-settings" class="invisible scrollbar"></div>

        <div id="message-box"></div>
    </div>

</body>
