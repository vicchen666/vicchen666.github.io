<!DOCTYPE html>
<html>

<head>
    <title>Calculators</title>
    <link rel="icon" type="image/x-icon" href="images/favicons/calculators.ico" />
    <link rel="stylesheet" href="styles/colors.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/calculators/main.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="scripts/calculators/main.js" defer></script>
    <script src="scripts/calculators/loot_luck.js" defer></script>
</head>

<body class="blue-dark-theme">
    <button id="button-show-sidebar" class="icon-button invisible" title="Show sidebar">
        <img src="images/svg_icons/3_lines.svg">
    </button>
    <div id="main-sidebar">
        <div>
            <button id="button-hide-sidebar" class="icon-button" title="Hide sidebar">
                <img src="images/svg_icons/3_lines.svg">
            </button>
            <a href="index.html" id="button-home" class="icon-button" title="Home Page">
                <img src="images/svg_icons/home.svg">
            </a>
        </div>
        <div>
            <button id="button-calculators-main">List</button>
            <button id="button-calculators-loot-luck">Loot Luck</button>
        </div>
    </div>
    <div id="main-container">
        <div id="main" class="editor">
            <header><div>Calculators</div></header>
            <section style="padding: 10px; line-height: 40px;">
                <div>
                    Hello!<br>
                    Here's some calculators you may find useful:<br>
                    <br>
                    ● Loot Luck<br>
                    Probability of achieving a certain amount of successes in a series of trials with two possible outcomes.<br>
                    <br>
                </div>
            </section>
        </div>
        <div id="loot-luck" class="editor invisible">
            <header><div>Loot Luck</div></header>
            <section style="padding: 10px;">
                <div>
                    <div>
                        <div>Trials</div>
                        <input id="input-loot-luck-trials" type="number" min="1">
                        <div>Successes</div>
                        <input id="input-loot-luck-successes" type="number" min="0">
                        <div>Success Chance (%)</div>
                        <input id="input-loot-luck-chance" type="number" min="0" max="100">
                    </div>
                    <div>
                        <div>
                            <button id="input-loot-luck-calculate" class="text-button">Calculate</button>
                            <div></div>
                        </div>
                        <div>Percentile Rank: </div>
                        <div>Exact Chance: </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

</body>

</html>
